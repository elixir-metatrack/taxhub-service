name: Build and publish container image to GHCR

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

jobs:
  prepare-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate scientific_names.csv
        run: make -C data

      - name: Upload scientific_names.csv
        uses: actions/upload-artifact@v4
        with:
          name: scientific-names-csv
          path: taxhub/scientific_names.csv

  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: taxhub/go.mod

      - name: Generate docs
        run: make swag
        working-directory: taxhub

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: |
            taxhub/docs/swagger.json
            taxhub/docs/swagger.yaml
            taxhub/docs/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: taxhub/docs/

  publish-docs:
    runs-on: ubuntu-latest
    needs: generate-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-and-push:
    runs-on: ubuntu-latest
    needs: prepare-data
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download scientific_names.csv
        uses: actions/download-artifact@v4
        with:
          name: scientific-names-csv
          path: taxhub/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./taxhub
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start container
        run: |
          docker run -d --name taxhub -p 8080:8080 \
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Wait for healthz
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/healthz; then
              echo "Service is up"
              exit 0
            fi
            echo "Waiting... ($i)"
            sleep 2
          done
          echo "Service did not start in time"
          docker logs taxhub
          exit 1

      - name: Test /healthz
        run: |
          STATUS=$(curl -sf http://localhost:8080/healthz | jq -r '.status')
          [ "$STATUS" = "ok" ] || (echo "unexpected status: $STATUS" && exit 1)

      - name: Test /taxon/9606
        run: |
          NAME=$(curl -sf http://localhost:8080/taxon/9606 | jq -r '.name')
          [ "$NAME" = "Homo sapiens" ] || (echo "unexpected name: $NAME" && exit 1)

      - name: Stop container
        if: always()
        run: docker rm -f taxhub
